<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f9fc;
      color: #1f2937;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, world!</h1>
    <p>Your webpage is live and ready to grow.</p>
  </main>
</body>
</html>
